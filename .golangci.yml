version: "2"

linters:
  default: none
  enable:
    # --- correctness: catches real bugs ---
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # --- security ---
    - gosec

    # --- code quality ---
    - gocyclo
    - dupl
    - misspell
    - unconvert
    - prealloc

    # --- Go idioms ---
    - nilerr
    - exhaustive

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/niktheblak/ruuvitag-gollector
        - github.com/niktheblak/ruuvitag-common

